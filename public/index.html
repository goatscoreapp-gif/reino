<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Fazendinha Virtual - Overlay TikTok LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root{
    --ceu-topo: #57c7f5;
    --ceu-baixo: #cdf1ff;
    --sol: #ffd93d;
    --sol-contorno: #f2a71b;
    --grama-topo: #92e36e;
    --grama-baixo: #4fae3a;
    --terra: #c08a48;
    --terra-escura: #8a5c2a;
    --madeira-clara: #e0a860;
    --madeira-media: #c1813f;
    --madeira-escura: #7a4f22;
    --cerca-clara: #e6bd7c;
    --cerca-escura: #a9723a;
    --contorno: #3b2414;
    --celeiro: #e2503b;
    --celeiro-escuro: #b83a29;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  #fazenda {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg, var(--ceu-topo) 0%, var(--ceu-baixo) 78%);
  }

  /* ---------- Sol (estilo brinquedo, com anel de contorno) ---------- */
  .sol {
    position: absolute;
    top: 6%; right: 9%;
    width: 88px; height: 88px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff6cf, var(--sol) 62%, var(--sol-contorno) 100%);
    border: 4px solid var(--sol-contorno);
    box-shadow: 0 0 40px 14px rgba(255, 217, 61, 0.55), inset 0 -6px 10px rgba(0,0,0,0.08);
    animation: respirarSol 4s ease-in-out infinite;
  }
  @keyframes respirarSol {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }

  /* ---------- Nuvens fofas ---------- */
  .nuvem {
    position: absolute;
    background: #ffffff;
    border-radius: 50px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.06);
    opacity: 0.95;
    animation: andarNuvem linear infinite;
  }
  @keyframes andarNuvem {
    from { transform: translateX(-30vw); }
    to   { transform: translateX(130vw); }
  }

  /* ---------- Colinas ao fundo ---------- */
  .colinas {
    position: absolute;
    left: 0; right: 0; bottom: 17%;
    height: 15%;
    background:
      radial-gradient(ellipse 55% 100% at 12% 100%, #6fce55 62%, transparent 63%),
      radial-gradient(ellipse 65% 100% at 50% 100%, #5cba48 62%, transparent 63%),
      radial-gradient(ellipse 50% 100% at 88% 100%, #6fce55 62%, transparent 63%);
    opacity: 0.95;
    pointer-events: none;
  }

  /* ---------- Celeiro decorativo ---------- */
  .celeiro { position: absolute; bottom: 18%; right: 6%; pointer-events: none; }

  /* ---------- Plantacoes decorativas (canteiros) ---------- */
  .canteiro {
    position: absolute;
    bottom: 13.5%;
    width: 90px; height: 26px;
    background: linear-gradient(180deg, var(--terra) 0%, var(--terra-escura) 100%);
    border: 3px solid var(--contorno);
    border-radius: 8px;
    background-image:
      linear-gradient(180deg, var(--terra) 0%, var(--terra-escura) 100%),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.12) 0 3px, transparent 3px 14px);
    pointer-events: none;
  }
  .canteiro .plantinha {
    position: absolute;
    top: -14px;
    font-size: 18px;
  }

  /* ---------- Cerca (piquete) ---------- */
  .cerca {
    position: absolute;
    left: 0; right: 0; bottom: 12.5%;
    height: 6%;
    background-image:
      linear-gradient(var(--cerca-escura), var(--cerca-escura)),
      repeating-linear-gradient(90deg, var(--cerca-clara) 0 16px, var(--cerca-escura) 16px 19px, transparent 19px 46px);
    background-size: 100% 22%, 100% 100%;
    background-position: top, top;
    background-repeat: no-repeat, repeat-x;
    border-top: 3px solid var(--contorno);
    pointer-events: none;
  }

  /* ---------- Grama (chao) ---------- */
  .grama {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 14%;
    background:
      repeating-linear-gradient(115deg, rgba(0,0,0,0.05) 0 10px, transparent 10px 22px),
      linear-gradient(180deg, var(--grama-topo) 0%, var(--grama-baixo) 100%);
    border-top: 4px solid var(--contorno);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  /* ---------- HUD (placar em placa de madeira) ---------- */
  #hud {
    position: absolute;
    top: 16px; left: 16px;
    z-index: 65;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 700;
    color: #fff6df;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  #hud span.valor { color: #fff; margin-left: 4px; }

  /* Painel "de madeira" reutilizado no HUD, toasts, CTA e painel de teste */
  .madeira {
    background:
      repeating-linear-gradient(180deg, var(--madeira-clara) 0 7px, var(--madeira-media) 7px 14px);
    border: 3px solid var(--contorno);
    border-radius: 12px;
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,0.35),
      inset 0 -4px 6px rgba(0,0,0,0.3),
      0 4px 10px rgba(0,0,0,0.3);
  }

  /* ---------- Bichinho (template generico) ---------- */
  .animal {
    position: absolute;
    top: 0; left: 0;
    will-change: transform;
    filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
  }
  .animal svg { display: block; overflow: visible; }

  .animal .perna { transform-origin: 50% 0%; animation: andar 0.5s ease-in-out infinite; }
  .animal .perna.b { animation-delay: 0.25s; }
  @keyframes andar {
    0%, 100% { transform: rotate(-13deg); }
    50% { transform: rotate(13deg); }
  }
  .ave .perna { animation-duration: 0.32s; }
  .porco .perna { animation-duration: 0.55s; }
  .ovelha .perna { animation-duration: 0.6s; }
  .vaca .perna { animation-duration: 0.68s; }
  .cavalo .perna { animation-duration: 0.4s; }
  .cachorro .perna { animation-duration: 0.3s; }
  .animal.turbo .perna { animation-duration: 0.16s !important; }

  .cavalo .crina, .cavalo .rabo, .cachorro .rabo {
    animation: balancar 0.9s ease-in-out infinite;
  }
  @keyframes balancar {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }
  .cachorro .rabo { animation-duration: 0.35s; }

  /* ---------- Bolha de fala (comentarios) ---------- */
  .fala {
    position: absolute;
    max-width: 220px;
    background: #fffdf6;
    color: #2c2210;
    padding: 8px 12px;
    border-radius: 14px;
    border: 2px solid var(--contorno);
    font-size: 13px;
    line-height: 1.3;
    box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    animation: apareceFala 5s ease forwards;
    pointer-events: none;
    z-index: 50;
  }
  .fala b { color: #4f7a2f; }
  .fala::after {
    content: "";
    position: absolute;
    bottom: -9px; left: 20px;
    border-width: 8px 8px 0 0;
    border-style: solid;
    border-color: var(--contorno) transparent transparent transparent;
  }
  .fala::before {
    content: "";
    position: absolute;
    bottom: -6px; left: 21px;
    border-width: 6px 6px 0 0;
    border-style: solid;
    border-color: #fffdf6 transparent transparent transparent;
    z-index: 1;
  }
  @keyframes apareceFala {
    0% { opacity: 0; transform: translateY(6px) scale(0.9); }
    10% { opacity: 1; transform: translateY(0) scale(1); }
    85% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ---------- Ambiente: borboletas, petalas e coracoes ---------- */
  .ambiente-item {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    user-select: none;
  }
  .borboleta { animation: voarBorboleta linear forwards; }
  @keyframes voarBorboleta {
    0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
    8%   { opacity: 1; }
    50%  { transform: translate(var(--dx1, 40px), var(--dy1, -30px)) rotate(12deg); }
    92%  { opacity: 1; }
    100% { transform: translate(var(--dx2, 80px), var(--dy2, -10px)) rotate(-8deg); opacity: 0; }
  }
  .petala { font-size: 14px; animation: cairPetala linear forwards; }
  @keyframes cairPetala {
    0%   { transform: translate(0, -10vh) rotate(0deg); opacity: 0.9; }
    100% { transform: translate(var(--deriva, 30px), 90vh) rotate(340deg); opacity: 0; }
  }
  .coracao { font-size: 18px; animation: subirCoracao ease-out forwards; }
  @keyframes subirCoracao {
    0%   { transform: translate(0,0) scale(0.6); opacity: 0; }
    15%  { opacity: 1; }
    100% { transform: translate(var(--deriva, 10px), -55vh) scale(1.1); opacity: 0; }
  }

  /* ---------- Toast de evento (presente / seguidor) ---------- */
  #toasts {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 6px;
    align-items: center;
    z-index: 60;
    pointer-events: none;
  }
  .toast {
    color: #fff6df;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    animation: entraToast 0.4s ease, sumeToast 0.5s ease 3.2s forwards;
    white-space: nowrap;
  }
  .toast.raro { border-color: #ffe066; box-shadow: 0 0 16px 4px rgba(255,224,102,0.6), inset 0 2px 3px rgba(255,255,255,0.35), inset 0 -4px 6px rgba(0,0,0,0.3); }
  @keyframes entraToast { from { opacity: 0; transform: translateY(-10px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes sumeToast { to { opacity: 0; transform: translateY(-10px); } }

  /* ---------- CTA (chamada para acao, placa de madeira) ---------- */
  #cta-wrap {
    position: absolute;
    bottom: 3%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 55;
    pointer-events: none;
    display: flex;
    justify-content: center;
    width: 100%;
    padding: 0 16px;
  }
  #cta {
    color: #fff6df;
    padding: 10px 24px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.2px;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    white-space: nowrap;
    animation: respirarCta 3s ease-in-out infinite;
  }
  @keyframes respirarCta {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.035); }
  }
  #cta.trocando { animation: trocarCta 0.5s ease; }
  @keyframes trocarCta {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Vinheta suave por cima de tudo ---------- */
  .vinheta {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 100px rgba(0,0,0,0.18);
    pointer-events: none;
  }

  /* ================= PAINEL DE SIMULACAO (tecla T) ================= */
  #painel-teste {
    position: absolute;
    top: 20px; right: 20px;
    width: 260px;
    padding: 14px;
    color: #fff6df;
    font-size: 13px;
    z-index: 100;
    display: none;
    max-height: 90vh;
    overflow-y: auto;
  }
  #painel-teste h3 { margin: 0 0 10px; font-size: 14px; color: #ffe066; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
  #painel-teste button {
    width: 100%;
    margin-bottom: 7px;
    padding: 9px;
    border: 2px solid var(--contorno);
    border-radius: 9px;
    background: linear-gradient(180deg, #8fd66b 0%, #4f9a3d 100%);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
    box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), inset 0 -3px 4px rgba(0,0,0,0.25), 0 3px 0 rgba(0,0,0,0.25);
  }
  #painel-teste button:hover { filter: brightness(1.08); }
  #painel-teste button:active { transform: translateY(2px); box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), inset 0 -1px 2px rgba(0,0,0,0.25); }
  #painel-teste .dourado { background: linear-gradient(180deg, #ffd93d 0%, #d99a1a 100%); }
  #painel-teste input {
    width: 100%;
    padding: 8px;
    border-radius: 7px;
    border: 2px solid var(--contorno);
    margin-bottom: 7px;
    font-size: 13px;
  }
  #painel-teste .dica {
    opacity: 0.85; font-size: 11px; margin-top: 8px; line-height: 1.4;
  }
</style>
</head>
<body>

<div id="fazenda">
  <div class="sol"></div>
  <div class="nuvem" style="top:10%; left:5%; width:110px; height:34px; animation-duration: 55s;"></div>
  <div class="nuvem" style="top:18%; left:40%; width:80px; height:26px; animation-duration: 70s; animation-delay: -20s;"></div>
  <div class="nuvem" style="top:8%; left:70%; width:130px; height:38px; animation-duration: 65s; animation-delay: -40s;"></div>

  <div class="colinas"></div>

  <div class="celeiro">
    <svg width="120" height="102" viewBox="0 0 120 102">
      <polygon points="5,42 55,5 105,42" fill="var(--celeiro-escuro)" stroke="#3b2414" stroke-width="3" stroke-linejoin="round"/>
      <rect x="10" y="40" width="90" height="55" fill="var(--celeiro)" stroke="#3b2414" stroke-width="3"/>
      <rect x="45" y="60" width="20" height="35" fill="#5c3a22" stroke="#3b2414" stroke-width="2"/>
      <rect x="18" y="55" width="14" height="14" fill="#fff6cf" stroke="#3b2414" stroke-width="2"/>
      <rect x="78" y="55" width="14" height="14" fill="#fff6cf" stroke="#3b2414" stroke-width="2"/>
      <line x1="55" y1="5" x2="55" y2="-10" stroke="#5c3a22" stroke-width="3"/>
    </svg>
  </div>

  <div class="canteiro" style="left:8%;"><span class="plantinha" style="left:8px;">🥕</span><span class="plantinha" style="left:34px;">🌽</span><span class="plantinha" style="left:60px;">🥬</span></div>
  <div class="canteiro" style="right:14%;"><span class="plantinha" style="left:10px;">🌻</span><span class="plantinha" style="left:38px;">🍓</span><span class="plantinha" style="left:64px;">🌽</span></div>

  <div id="camada-animais"></div>
  <div id="camada-ambiente"></div>
  <div id="camada-falas"></div>

  <div class="cerca"></div>
  <div class="grama"></div>

  <div id="hud" class="madeira">
    <div>🎁 Presentes<span class="valor" id="hud-presentes">0</span></div>
    <div>❤️ Curtidas<span class="valor" id="hud-curtidas">0</span></div>
    <div>🐶 Seguidores<span class="valor" id="hud-seguidores">0</span></div>
  </div>

  <div id="toasts"></div>
  <div id="cta-wrap"><div id="cta" class="madeira"></div></div>
  <div class="vinheta"></div>
</div>

<!-- ===================== PAINEL DE TESTE (tecla T) ===================== -->
<div id="painel-teste" class="madeira">
  <h3>🧪 Simular eventos</h3>
  <button onclick="simular('presente', {diamantes: 5, usuario: 'fan_teste'})">🎁 Presente pequeno (pintinho)</button>
  <button onclick="simular('presente', {diamantes: 20, usuario: 'fan_teste'})">🎁 Presente médio (galinha)</button>
  <button onclick="simular('presente', {diamantes: 60, usuario: 'fan_teste'})">🎁 Presente médio+ (porquinho)</button>
  <button onclick="simular('presente', {diamantes: 300, usuario: 'fan_teste'})">🎁 Presente grande (ovelha)</button>
  <button onclick="simular('presente', {diamantes: 600, usuario: 'fan_vip'})">🎁 Presente enorme (vaca)</button>
  <button class="dourado" onclick="simular('presente', {diamantes: 1500, usuario: 'fan_vip'})">💎 Presente raro (cavalo dourado)</button>
  <button class="dourado" onclick="simular('seguidor', {usuario: 'novo_fan'})">➕ Novo seguidor (cachorro)</button>
  <button onclick="simular('curtida', {quantidade: 20})">❤️ Curtida x20</button>
  <input id="input-comentario" placeholder="Digite um comentário..." />
  <button onclick="enviarComentarioTeste()">💬 Enviar comentário</button>
  <div class="dica">Pressione <b>T</b> para abrir/fechar este painel. Ele não aparece para quem assiste a live.</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================
// ESTADO E CONEXAO
// ============================================================
const socket = io();
const camadaAnimais = document.getElementById('camada-animais');
const camadaAmbiente = document.getElementById('camada-ambiente');
const camadaFalas = document.getElementById('camada-falas');
const toasts = document.getElementById('toasts');
const hudPresentes = document.getElementById('hud-presentes');
const hudCurtidas = document.getElementById('hud-curtidas');
const hudSeguidores = document.getElementById('hud-seguidores');

const animaisNaTela = new Map(); // id -> {el, x, lane, dir, vel, fase, tamanho, especie}
let boostAte = 0; // timestamp ate quando os bichinhos ficam "animados" (curtidas)
let contadorId = 0;
function idUnico(prefixo) { return `${prefixo}-${contadorId++}`; }

// contorno cartoon usado em todos os desenhos, pra dar aquele efeito
// de "recorte de brinquedo" tipico dos jogos de fazenda old-school
const T = 'stroke="#3b2414" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"';

// Faixas (lanes) de profundidade: fundo, meio e frente do terreno
const FAIXAS = [
  { y: 60, escala: 0.72, vel: 0.65 },
  { y: 69, escala: 0.9,  vel: 0.85 },
  { y: 80, escala: 1.12, vel: 1.0  },
];

// ------------------------------------------------------------
// Definicao visual de cada especie (cores e tipo de desenho)
// ------------------------------------------------------------
const ESPECIES = {
  'pintinho':      { tipo: 'ave',      cor1: '#fff1a6', cor2: '#ffcf3d', crista: false },
  'galinha':       { tipo: 'ave',      cor1: '#fffaf0', cor2: '#e7dcc2', crista: true },
  'porquinho':     { tipo: 'porco',    cor1: '#ffc2d4', cor2: '#ff8fab' },
  'ovelha':        { tipo: 'ovelha',   cor1: '#ffffff', cor2: '#3a3a3a' },
  'vaca':          { tipo: 'vaca',     cor1: '#ffffff', cor2: '#2b2b2b' },
  'cavalo-dourado':{ tipo: 'cavalo',   cor1: '#ffd23d', cor2: '#e8890f' },
  'cachorro':      { tipo: 'cachorro', cor1: '#d99a5c', cor2: '#8a5a2c' },
};

// ------------------------------------------------------------
// Construtores de SVG (um por tipo de bichinho) - todos com
// contorno grosso e bochechas coradas, estilo "brinquedo fofo"
// ------------------------------------------------------------
function criarSvgAve(def) {
  const gradId = idUnico('avegrad');
  const crista = def.crista
    ? `<path d="M -3 -18 Q 1 -25 5 -18 Q 2 -21 -3 -18 Z" fill="#e6432f" ${T}/>
       <path d="M 2 -19 Q 6 -26 10 -19 Q 7 -22 2 -19 Z" fill="#e6432f" ${T}/>`
    : '';
  const barbela = def.crista ? `<path d="M 15 -1 Q 19 3 15 7 Q 13 3 15 -1 Z" fill="#e6432f" ${T}/>` : '';
  const cauda = def.crista
    ? `<path d="M -16 -6 Q -27 -14 -20 -2 Q -27 2 -18 4 Q -25 8 -14 8 Z" fill="${def.cor2}" ${T}/>`
    : `<ellipse cx="-14" cy="2" rx="6" ry="7" fill="${def.cor2}" ${T}/>`;
  return `
  <svg width="56" height="42" viewBox="-28 -21 56 42">
    <defs>
      <radialGradient id="${gradId}" cx="35%" cy="30%" r="75%">
        <stop offset="0%" stop-color="${def.cor1}"/>
        <stop offset="100%" stop-color="${def.cor2}"/>
      </radialGradient>
    </defs>
    <g class="perna a"><rect x="-4" y="8" width="2" height="8" fill="#e2a13d"/></g>
    <g class="perna b"><rect x="4" y="8" width="2" height="8" fill="#e2a13d"/></g>
    ${cauda}
    <ellipse cx="0" cy="0" rx="16" ry="13" fill="url(#${gradId})" ${T}/>
    <circle cx="14" cy="-8" r="9" fill="url(#${gradId})" ${T}/>
    ${crista}
    ${barbela}
    <path d="M 20 -8 L 27 -6 L 20 -4 Z" fill="#ff9f1c" ${T}/>
    <ellipse cx="10" cy="-4" rx="2.4" ry="1.6" fill="#ff9f9f" opacity="0.65"/>
    <circle cx="17" cy="-9" r="1.6" fill="#111"/>
    <circle cx="17.6" cy="-9.6" r="0.5" fill="#fff"/>
  </svg>`;
}

function criarSvgPorco(def) {
  const gradId = idUnico('porcograd');
  return `
  <svg width="70" height="46" viewBox="-35 -23 70 46">
    <defs>
      <radialGradient id="${gradId}" cx="35%" cy="30%" r="75%">
        <stop offset="0%" stop-color="${def.cor1}"/>
        <stop offset="100%" stop-color="${def.cor2}"/>
      </radialGradient>
    </defs>
    <g class="perna a"><rect x="-14" y="10" width="4" height="9" fill="${def.cor2}"/></g>
    <g class="perna b"><rect x="10" y="10" width="4" height="9" fill="${def.cor2}"/></g>
    <path d="M -8 -14 Q -16 -22 -6 -18 Z" fill="${def.cor2}" ${T}/>
    <path d="M 2 -15 Q -2 -23 8 -19 Z" fill="${def.cor2}" ${T}/>
    <path d="M -20 2 Q -28 -2 -26 4 Q -28 8 -20 6 Z" fill="${def.cor2}" ${T}/>
    <ellipse cx="0" cy="0" rx="20" ry="13" fill="url(#${gradId})" ${T}/>
    <ellipse cx="-6" cy="-3" rx="3" ry="2" fill="#ff9f9f" opacity="0.6"/>
    <ellipse cx="22" cy="2" rx="7" ry="6" fill="${def.cor2}" ${T}/>

function montarElementoAnimal(animal) {
  const def = ESPECIES[animal.especie] || ESPECIES['pintinho'];
  const el = document.createElement('div');
  el.className = 'animal ' + def.tipo;
  el.style.transform = `scale(${animal.tamanho})`;
  const construtores = {
    ave: criarSvgAve,
    porco: criarSvgPorco,
    ovelha: criarSvgOvelha,
    vaca: criarSvgVaca,
    cavalo: criarSvgCavalo,
    cachorro: criarSvgCachorro,
  };
  const construtor = construtores[def.tipo] || criarSvgAve;
  el.innerHTML = construtor(def);
  camadaAnimais.appendChild(el);
  return el;
}

// ------------------------------------------------------------
// Adiciona um bichinho na fazenda com faixa/posicao aleatoria
// ------------------------------------------------------------
function adicionarAnimalNaTela(animal) {
  if (animaisNaTela.has(animal.id)) return;
  const el = montarElementoAnimal(animal);
  const faixa = FAIXAS[Math.floor(Math.random() * FAIXAS.length)];
  el.style.zIndex = String(10 + FAIXAS.indexOf(faixa));
  const registro = {
    el,
    x: Math.random() * 80 + 5,
    laneY: faixa.y,
    escalaFaixa: faixa.escala,
    velFaixa: faixa.vel,
    dir: Math.random() > 0.5 ? 1 : -1,
    vel: 0.035 + Math.random() * 0.045,
    fase: Math.random() * Math.PI * 2,
    tamanho: animal.tamanho,
    especie: animal.especie,
  };
  animaisNaTela.set(animal.id, registro);
}

// ------------------------------------------------------------
// Loop de animacao: caminha em zigue-zague suave dentro da faixa
// ------------------------------------------------------------
function animar() {
  const turbo = Date.now() < boostAte;
  animaisNaTela.forEach((a) => {
    a.fase += 0.03;
    a.x += a.dir * a.vel * a.velFaixa * (turbo ? 2.4 : 1);
    const y = a.laneY + Math.sin(a.fase) * 1.4;

    if (a.x > 92) { a.dir = -1; a.x = 92; }
    if (a.x < 2) { a.dir = 1; a.x = 2; }

    const escala = a.tamanho * a.escalaFaixa;
    a.el.style.transform =
      `translate(${a.x}vw, ${y}vh) scale(${a.dir === -1 ? -escala : escala}, ${escala})`;
    a.el.classList.toggle('turbo', turbo);
  });
  requestAnimationFrame(animar);
}
requestAnimationFrame(animar);

// ============================================================
// AMBIENTE: borboletas, petalas e coracoes
// ============================================================
function criarBorboleta() {
  const b = document.createElement('div');
  b.className = 'ambiente-item borboleta';
  b.textContent = Math.random() > 0.5 ? '🦋' : '🐝';
  b.style.left = Math.random() * 90 + 'vw';
  b.style.top = (30 + Math.random() * 40) + 'vh';
  b.style.setProperty('--dx1', (Math.random() * 80 - 40) + 'px');
  b.style.setProperty('--dy1', (Math.random() * 40 - 30) + 'px');
  b.style.setProperty('--dx2', (Math.random() * 140 - 70) + 'px');
  b.style.setProperty('--dy2', (Math.random() * 30 - 10) + 'px');
  b.style.animationDuration = (7 + Math.random() * 5) + 's';
  camadaAmbiente.appendChild(b);
  setTimeout(() => b.remove(), 13000);
}
setInterval(criarBorboleta, 2200);

function criarPetala() {
  const p = document.createElement('div');
  p.className = 'ambiente-item petala';
  p.textContent = Math.random() > 0.5 ? '🍃' : '🌸';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.top = '-4vh';
  p.style.setProperty('--deriva', (Math.random() * 60 - 30) + 'px');
  p.style.animationDuration = (10 + Math.random() * 8) + 's';
  camadaAmbiente.appendChild(p);
  setTimeout(() => p.remove(), 19000);
}
setInterval(criarPetala, 1600);

function criarCoracao() {
  const c = document.createElement('div');
  c.className = 'ambiente-item coracao';
  c.textContent = '❤️';
  c.style.left = (10 + Math.random() * 80) + 'vw';
  c.style.top = '78vh';
  c.style.setProperty('--deriva', (Math.random() * 40 - 20) + 'px');
  c.style.animationDuration = (2 + Math.random()) + 's';
  camadaAmbiente.appendChild(c);
  setTimeout(() => c.remove(), 3200);
}
function explosaoCoracoes(qtd) {
  for (let i = 0; i < qtd; i++) setTimeout(criarCoracao, i * 60);
}

// ============================================================
// CTA (chamada para acao) - convida o publico a interagir
// ============================================================
const FRASES_CTA = [
  '🎁 Manda um presente e um bichinho novo nasce na fazenda!',
  '➕ Segue o perfil e libera um cachorrinho fiel! 🐶',
  '❤️ Curte a live pra deixar os bichinhos animados!',
  '💬 Comenta aí — seu comentário aparece na fazenda!',
  '💎 Presentes maiores trazem bichinhos mais raros',
];
const ctaEl = document.getElementById('cta');
let indiceCta = 0;

function mostrarProximaCta() {
  ctaEl.classList.remove('trocando');
  void ctaEl.offsetWidth; // forca reflow pra reiniciar a animacao
  ctaEl.textContent = FRASES_CTA[indiceCta];
  ctaEl.classList.add('trocando');
  indiceCta = (indiceCta + 1) % FRASES_CTA.length;
}
mostrarProximaCta();
setInterval(mostrarProximaCta, 6000);

// ============================================================
// EVENTOS RECEBIDOS DO SERVIDOR
// ============================================================
socket.on('estado-inicial', (estado) => {
  estado.animais.forEach(adicionarAnimalNaTela);
  if (estado.totais) {
    hudPresentes.textContent = estado.totais.presentes || 0;
    hudCurtidas.textContent = estado.totais.curtidas || 0;
    hudSeguidores.textContent = estado.totais.seguidores || 0;
  }
});

socket.on('novo-animal', (payload) => {
  adicionarAnimalNaTela(payload.animal);
  if (payload.especial) {
    hudSeguidores.textContent = Number(hudSeguidores.textContent) + 1;
  } else {
    hudPresentes.textContent = Number(hudPresentes.textContent) + 1;
  }
  const texto = payload.especial
    ? `➕ @${payload.usuario} seguiu! Um cachorro apareceu 🐶`
    : `🎁 @${payload.usuario} enviou ${payload.nomePresente || 'um presente'} — novo bichinho!`;
  mostrarToast(texto, payload.animal.raro);
});

socket.on('curtida', (payload) => {
  boostAte = Date.now() + 2500;
  hudCurtidas.textContent = payload.total ?? (Number(hudCurtidas.textContent) + payload.quantidade);
  explosaoCoracoes(Math.min(12, Math.ceil(payload.quantidade / 3)));
});

socket.on('comentario', (payload) => {
  mostrarFala(payload.usuario, payload.texto);
});

function mostrarToast(texto, raro) {
  const t = document.createElement('div');
  t.className = 'toast madeira' + (raro ? ' raro' : '');
  t.textContent = texto;
  toasts.appendChild(t);
  setTimeout(() => t.remove(), 3800);
}

function mostrarFala(usuario, texto) {
  if (!texto) return;
  const registros = Array.from(animaisNaTela.values());
  if (registros.length === 0) return;
  const alvo = registros[Math.floor(Math.random() * registros.length)];

  const fala = document.createElement('div');
  fala.className = 'fala';
  fala.innerHTML = `<b>@${usuario}</b><br>${escapeHtml(texto)}`;
  fala.style.left = `calc(${alvo.x}vw + 10px)`;
  fala.style.top = `${alvo.laneY}vh`;
  camadaFalas.appendChild(fala);
  setTimeout(() => fala.remove(), 5000);
}

function escapeHtml(texto) {
  const div = document.createElement('div');
  div.textContent = texto;
  return div.innerHTML;
}

// ============================================================
// PAINEL DE SIMULACAO (tecla T) - testar sem estar ao vivo
// ============================================================
const painel = document.getElementById('painel-teste');
document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 't') {
    painel.style.display = painel.style.display === 'none' ? 'block' : 'none';
  }
});

function simular(tipo, dados) {
  socket.emit('simular', { tipo, dados });
}

function enviarComentarioTeste() {
  const input = document.getElementById('input-comentario');
  const texto = input.value.trim();
  if (!texto) return;
  simular('comentario', { usuario: 'voce_testando', texto });
  input.value = '';
}
</script>
