<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bicho de Estimação Coletivo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --bg-deep: #0E1F1A;
    --bg-mid: #163229;
    --panel: rgba(18, 44, 36, 0.88);
    --glass-hi: rgba(255, 255, 255, 0.10);
    --glass-lo: rgba(255, 255, 255, 0.03);
    --moss: #6FBE95;
    --moss-dark: #2E6B4E;
    --moss-deep: #1E4A36;
    --glow: #F4C77B;
    --glow-soft: #F7DBA0;
    --cream: #EAF3EC;
    --cream-dim: #B9CDC3;
    --blush: #F0A5A0;
    --font-display: 'Baloo 2', cursive;
    --font-body: 'Nunito', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(111,190,149,0.10) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, var(--bg-mid) 0%, var(--bg-deep) 75%);
    font-family: var(--font-body);
    color: var(--cream);
  }

  .palco {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3.2vh 5vw 2.5vh 5vw;
  }

  /* vaga-lumes ambiente flutuando pelo fundo */
  .vaga-lume {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--glow);
    box-shadow: 0 0 8px 2px var(--glow-soft);
    opacity: 0;
    animation: flutuar 7s ease-in-out infinite;
    z-index: 1;
  }
  @keyframes flutuar {
    0%   { opacity: 0; transform: translateY(0) translateX(0); }
    15%  { opacity: 0.9; }
    85%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-14vh) translateX(3vw); }
  }

  /* ---------- topo: cuidadores + titulo, sem sobrepor ---------- */
  .topo {
    width: 100%;
    display: grid;
    grid-template-columns: minmax(0, 34vw) 1fr minmax(0, 34vw);
    align-items: flex-start;
    z-index: 3;
  }
  .cuidadores {
    grid-column: 1;
    justify-self: start;
    background: var(--panel);
    border: 1.5px solid var(--moss-dark);
    border-radius: 12px;
    padding: 1vh 2.2vw;
    max-width: 34vw;
    backdrop-filter: blur(2px);
  }
  .cuidadores h3 {
    margin: 0 0 0.5vh 0;
    font-family: var(--font-display);
    font-size: clamp(0.72rem, 2.6vw, 0.88rem);
    color: var(--glow-soft);
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  .cuidadores ol {
    margin: 0;
    padding-left: 1.05em;
    font-size: clamp(0.72rem, 2.6vw, 0.86rem);
    line-height: 1.45;
    color: var(--cream-dim);
  }
  .cuidadores li span {
    font-family: var(--font-mono);
    color: var(--glow);
    font-weight: 600;
  }

  .cabecalho {
    grid-column: 2;
    text-align: center;
  }
  .eyebrow {
    font-size: clamp(0.7rem, 2.6vw, 0.9rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--moss);
    margin: 0 0 0.3vh 0;
    font-weight: 700;
  }
  .titulo {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 6.2vw, 2.3rem);
    font-weight: 700;
    color: var(--cream);
    margin: 0;
    text-shadow: 0 2px 14px rgba(111, 190, 149, 0.35);
  }

  /* ---------- banner de evento (toast rotativo) ---------- */
  .banner-evento {
    margin-top: 1.6vh;
    min-height: 3.4vh;
    font-size: clamp(0.85rem, 3.4vw, 1.05rem);
    color: var(--cream-dim);
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 3;
  }
  .banner-evento.visivel { opacity: 1; }
  .banner-evento b { color: var(--glow); }

  /* ---------- terrario ---------- */
  .terrario-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    min-height: 0;
  }
  .terrario {
    position: relative;
    width: min(72vw, 340px);
    height: min(46vh, 380px);
    border-radius: 46% 46% 8% 8% / 30% 30% 8% 8%;
    background: linear-gradient(180deg, var(--glass-hi) 0%, var(--glass-lo) 40%, rgba(111,190,149,0.06) 100%);
    border: 2.5px solid rgba(234, 243, 236, 0.28);
    box-shadow:
      inset 0 10px 30px rgba(255,255,255,0.06),
      inset 0 -30px 50px rgba(0,0,0,0.35),
      0 20px 50px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .terrario::before {
    /* reflexo de vidro */
    content: '';
    position: absolute;
    top: 6%;
    left: 8%;
    width: 14%;
    height: 70%;
    background: linear-gradient(180deg, rgba(255,255,255,0.22), transparent);
    border-radius: 50%;
    filter: blur(2px);
  }
  .chao-terrario {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 20%;
    background: linear-gradient(180deg, var(--moss-deep) 0%, #10281C 100%);
    border-top: 2px solid rgba(111,190,149,0.35);
  }

  /* ---------- criatura ---------- */
  .criatura-area {
    position: absolute;
    left: 50%;
    bottom: 18%;
    transform: translateX(-50%);
    width: 40%;
    height: 46%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .aureola {
    position: absolute;
    bottom: -4%;
    width: 130%;
    height: 60%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(244,199,123,0.35) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.6s ease;
    animation: pulsar 3.2s ease-in-out infinite;
  }
  [data-estagio="3"] .aureola, [data-estagio="4"] .aureola { opacity: 1; }
  @keyframes pulsar {
    0%, 100% { transform: scale(0.94); opacity: 0.55; }
    50% { transform: scale(1.06); opacity: 0.9; }
  }

  .corpo {
    position: relative;
    width: 62%;
    height: 78%;
    background: linear-gradient(160deg, var(--moss) 0%, var(--moss-dark) 100%);
    border-radius: 46% 54% 50% 50% / 58% 58% 42% 42%;
    box-shadow: inset -8px -10px 16px rgba(0,0,0,0.22), inset 6px 8px 14px rgba(255,255,255,0.15);
    transition: width 0.6s ease, height 0.6s ease;
    animation: respirar 3.6s ease-in-out infinite;
  }
  @keyframes respirar {
    0%, 100% { transform: scale(1, 1); }
    50% { transform: scale(1.03, 0.97); }
  }

  [data-estagio="0"] .corpo { width: 38%; height: 46%; border-radius: 50% 50% 48% 48% / 60% 60% 40% 40%; background: linear-gradient(160deg, #DCE9DC, #B9CDC3); }
  [data-estagio="1"] .corpo { width: 48%; height: 56%; }
  [data-estagio="2"] .corpo { width: 58%; height: 68%; }
  [data-estagio="3"] .corpo { width: 68%; height: 80%; }
  [data-estagio="4"] .corpo { width: 76%; height: 90%; background: linear-gradient(160deg, var(--glow-soft) 0%, var(--moss) 55%, var(--moss-dark) 100%); }

  /* rachaduras do ovo (estagio 0) */
  .rachadura {
    position: absolute;
    display: none;
    background: var(--moss-dark);
    opacity: 0.5;
  }
  [data-estagio="0"] .rachadura { display: block; }
  .rachadura.r1 { top: 30%; left: 45%; width: 2px; height: 22%; transform: rotate(18deg); }
  .rachadura.r2 { top: 40%; left: 55%; width: 2px; height: 14%; transform: rotate(-15deg); }

  /* folhinhas (a partir do estagio 2) */
  .folha {
    position: absolute;
    display: none;
    width: 22%;
    height: 30%;
    background: var(--moss);
    border: 2px solid var(--moss-dark);
    border-radius: 0% 100% 0% 100%;
  }
  [data-estagio="2"] .folha, [data-estagio="3"] .folha, [data-estagio="4"] .folha { display: block; }
  .folha.esquerda { top: -12%; left: 8%; transform: rotate(-25deg); }
  .folha.direita { top: -12%; right: 8%; transform: rotate(115deg); }

  /* pontinhos de coroa (estagio 4 - lendario) */
  .ponta-coroa {
    position: absolute;
    display: none;
    width: 8%;
    height: 16%;
    top: -14%;
    background: var(--glow);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow: 0 0 10px 2px var(--glow-soft);
  }
  [data-estagio="4"] .ponta-coroa { display: block; }
  .ponta-coroa.c1 { left: 22%; }
  .ponta-coroa.c2 { left: 46%; top: -20%; }
  .ponta-coroa.c3 { right: 22%; }

  /* olhos e boca */
  .rosto {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 30%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  [data-estagio="0"] .rosto { display: none; }
  .olho {
    width: 14%;
    height: 40%;
    background: var(--bg-deep);
    border-radius: 50%;
    transition: height 0.3s ease, border-radius 0.3s ease;
  }
  .boca {
    position: absolute;
    bottom: -6%;
    left: 50%;
    transform: translateX(-50%);
    width: 26%;
    height: 30%;
    border: 3px solid var(--bg-deep);
    border-top: none;
    border-left: none;
    border-right: none;
    border-radius: 0 0 50% 50%;
    transition: all 0.3s ease;
  }

  /* humor: neutro (padrao ja definido acima) */
  [data-humor="triste"] .olho { height: 22%; border-radius: 40% 40% 60% 60%; }
  [data-humor="triste"] .boca { border-radius: 50% 50% 0 0; border-bottom: none; border-top: 3px solid var(--bg-deep); bottom: 2%; }
  [data-humor="dormindo"] .olho { height: 5%; border-radius: 0; }
  [data-humor="dormindo"] .boca { opacity: 0.4; }
  .zzz {
    position: absolute;
    top: -6%;
    right: -8%;
    font-family: var(--font-display);
    font-size: clamp(0.9rem, 4vw, 1.3rem);
    color: var(--cream-dim);
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  [data-humor="dormindo"] .zzz { opacity: 0.85; }

  /* ---------- barra de humor (canto) ---------- */
  .humor-wrap {
    position: absolute;
    top: 2vh;
    right: 5vw;
    width: 22vw;
    max-width: 120px;
    z-index: 4;
  }
  .humor-label {
    font-size: clamp(0.6rem, 2.2vw, 0.72rem);
    color: var(--cream-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.4vh;
    display: flex;
    justify-content: space-between;
  }
  .humor-barra {
    width: 100%;
    height: 1.1vh;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    overflow: hidden;
  }
  .humor-preenchimento {
    height: 100%;
    background: linear-gradient(90deg, var(--blush), var(--glow));
    width: 70%;
    transition: width 0.5s ease;
  }

  /* ---------- progresso de evolucao ---------- */
  .progresso-wrap {
    width: min(80vw, 380px);
    z-index: 3;
    margin-top: 1vh;
  }
  .progresso-label {
    display: flex;
    justify-content: space-between;
    font-size: clamp(0.75rem, 3vw, 0.92rem);
    color: var(--cream-dim);
    margin-bottom: 0.6vh;
    font-family: var(--font-mono);
  }
  .progresso-label .fase-atual {
    font-family: var(--font-display);
    color: var(--glow-soft);
    font-size: clamp(0.9rem, 3.6vw, 1.1rem);
  }
  .progresso-barra {
    width: 100%;
    height: 1.6vh;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .progresso-preenchimento {
    height: 100%;
    background: linear-gradient(90deg, var(--moss), var(--glow));
    width: 0%;
    transition: width 0.5s ease;
  }

  /* ---------- estatisticas ---------- */
  .stats {
    display: flex;
    gap: 4vw;
    margin-top: 1.6vh;
    font-family: var(--font-mono);
    font-size: clamp(0.72rem, 2.8vw, 0.88rem);
    color: var(--cream-dim);
    z-index: 3;
  }
  .stats span b { color: var(--cream); font-weight: 600; }

  /* ---------- instrucao ---------- */
  .instrucao {
    text-align: center;
    font-size: clamp(0.8rem, 3.2vw, 1rem);
    color: var(--cream-dim);
    max-width: 84vw;
    margin-top: 1.2vh;
    z-index: 3;
  }
  .instrucao b { color: var(--moss); }

  /* ---------- celebracao de evolucao ---------- */
  .celebracao {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    background: radial-gradient(ellipse at 50% 50%, rgba(244,199,123,0.25), rgba(14,31,26,0.85) 70%);
  }
  .celebracao.visivel { display: flex; }
  .celebracao-caixa {
    text-align: center;
    padding: 4vh 8vw;
  }
  .celebracao-caixa .titulo-evolucao {
    font-family: var(--font-display);
    font-size: clamp(1rem, 4vw, 1.3rem);
    color: var(--cream-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .celebracao-caixa .nome-evolucao {
    font-family: var(--font-display);
    font-size: clamp(2.2rem, 11vw, 3.4rem);
    color: var(--glow);
    text-shadow: 0 0 30px rgba(244,199,123,0.6);
    margin: 1vh 0;
  }

  /* ---------- painel de teste ---------- */
  .painel-teste {
    position: fixed;
    bottom: 2vh;
    right: 2vw;
    background: rgba(0,0,0,0.85);
    border: 2px solid var(--moss);
    border-radius: 10px;
    padding: 12px;
    z-index: 20;
    display: none;
    font-family: var(--font-body);
    color: var(--cream);
    max-width: 60vw;
  }
  .painel-teste.visivel { display: block; }
  .painel-teste h4 { margin: 0 0 8px 0; font-size: 1rem; }
  .painel-teste .linha { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .painel-teste button {
    background: var(--moss);
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 0.9rem;
    color: var(--bg-deep);
  }
</style>
</head>
<body>

<div class="palco" id="palco">
  <div class="topo">
    <div class="cuidadores">
      <h3>💚 Cuidadores</h3>
      <ol id="listaCuidadores">
        <li>Ainda ninguém cuidou dele hoje...</li>
      </ol>
    </div>
    <div class="cabecalho">
      <p class="eyebrow">Bicho de Estimação Coletivo</p>
      <h1 class="titulo" id="nomeEstagio">Ovo</h1>
    </div>
  </div>

  <div class="humor-wrap">
    <div class="humor-label"><span>Humor</span><span id="humorTexto">70%</span></div>
    <div class="humor-barra"><div class="humor-preenchimento" id="humorBarra"></div></div>
  </div>

  <div class="banner-evento" id="bannerEvento"></div>

  <div class="terrario-wrap">
    <div class="terrario" id="terrario" data-estagio="0" data-humor="neutro">
      <div class="chao-terrario"></div>
      <div class="criatura-area">
        <div class="aureola"></div>
        <div class="corpo" id="corpoCriatura">
          <div class="rachadura r1"></div>
          <div class="rachadura r2"></div>
          <div class="folha esquerda"></div>
          <div class="folha direita"></div>
          <div class="ponta-coroa c1"></div>
          <div class="ponta-coroa c2"></div>
          <div class="ponta-coroa c3"></div>
          <div class="rosto">
            <div class="olho"></div>
            <div class="olho"></div>
            <div class="boca"></div>
          </div>
          <div class="zzz">zZz</div>
        </div>
      </div>
    </div>
  </div>

  <div class="progresso-wrap">
    <div class="progresso-label">
      <span class="fase-atual" id="faseAtualLabel">Ovo</span>
      <span id="xpTexto">0 / 100 XP</span>
    </div>
    <div class="progresso-barra"><div class="progresso-preenchimento" id="progressoBarra"></div></div>
  </div>

  <div class="stats">
    <span>💬 <b id="statComentarios">0</b></span>
    <span>❤️ <b id="statCurtidas">0</b></span>
    <span>🎁 <b id="statPresentes">0</b></span>
    <span>➕ <b id="statSeguidores">0</b></span>
  </div>

  <div class="instrucao">
    Comente, curta, siga ou mande um <b>presente</b> para ajudar o bicho a crescer! Todo mundo cuida do mesmo bichinho. 🌿
  </div>

  <div class="celebracao" id="celebracao">
    <div class="celebracao-caixa">
      <div class="titulo-evolucao">Ele evoluiu!</div>
      <div class="nome-evolucao" id="nomeEvolucao">Filhote</div>
    </div>
  </div>
</div>

<div class="painel-teste" id="painelTeste">
  <h4>Painel de teste (tecla T)</h4>
  <div class="linha">
    <button onclick="simular('comentario')">💬 Comentário</button>
    <button onclick="simular('presente')">🎁 Presente</button>
  </div>
  <div class="linha">
    <button onclick="simular('seguidor')">➕ Seguidor</button>
    <button onclick="simular('curtidas50')">❤️ +50 curtidas</button>
  </div>
</div>

<script>
const socket = io();
const palco = document.getElementById('palco');
const terrario = document.getElementById('terrario');

// ---------------------------------------------------------------------------
// Vaga-lumes ambiente (decorativo, gerado uma vez)
// ---------------------------------------------------------------------------
for (let i = 0; i < 10; i++) {
  const v = document.createElement('div');
  v.className = 'vaga-lume';
  v.style.left = `${5 + Math.random() * 90}%`;
  v.style.bottom = `${Math.random() * 30}%`;
  v.style.animationDelay = `${Math.random() * 7}s`;
  v.style.animationDuration = `${6 + Math.random() * 4}s`;
  palco.appendChild(v);
}

// ---------------------------------------------------------------------------
// Estado vindo do servidor
// ---------------------------------------------------------------------------
function humorParaTexto(humor) {
  if (humor <= 0) return 'dormindo';
  if (humor < 30) return 'triste';
  if (humor < 70) return 'neutro';
  return 'feliz';
}

socket.on('estado', (dados) => {
  terrario.setAttribute('data-estagio', dados.estagioIndex);
  terrario.setAttribute('data-humor', humorParaTexto(dados.humor));

  document.getElementById('nomeEstagio').textContent = dados.estagioNome;
  document.getElementById('faseAtualLabel').textContent = dados.estagioNome;
  document.getElementById('humorTexto').textContent = `${dados.humor}%`;
  document.getElementById('humorBarra').style.width = `${dados.humor}%`;

  document.getElementById('statComentarios').textContent = dados.totalComentarios;
  document.getElementById('statCurtidas').textContent = dados.totalCurtidas;
  document.getElementById('statPresentes').textContent = dados.totalPresentes;
  document.getElementById('statSeguidores').textContent = dados.totalSeguidores;

  const xpTexto = document.getElementById('xpTexto');
  const barra = document.getElementById('progressoBarra');
  if (dados.xpProximoEstagio === null) {
    xpTexto.textContent = `${dados.xp} XP · fase máxima!`;
    barra.style.width = '100%';
  } else {
    const faixa = dados.xpProximoEstagio - dados.xpEstagioAtual;
    const progresso = dados.xp - dados.xpEstagioAtual;
    const pct = Math.max(0, Math.min(100, (progresso / faixa) * 100));
    xpTexto.textContent = `${dados.xp} / ${dados.xpProximoEstagio} XP`;
    barra.style.width = `${pct}%`;
  }

  const listaCuidadores = document.getElementById('listaCuidadores');
  if (!dados.topContribuidores || dados.topContribuidores.length === 0) {
    listaCuidadores.innerHTML = '<li>Ainda ninguém cuidou dele hoje...</li>';
  } else {
    listaCuidadores.innerHTML = '';
    dados.topContribuidores.forEach((c) => {
      const li = document.createElement('li');
      li.innerHTML = `${c.nome} <span>${c.xp} xp</span>`;
      listaCuidadores.appendChild(li);
    });
  }
});

// ---------------------------------------------------------------------------
// Banner de eventos (toast rotativo)
// ---------------------------------------------------------------------------
const bannerEvento = document.getElementById('bannerEvento');
let filaEventos = [];
let mostrandoBanner = false;

function textoDoEvento(dados) {
  if (dados.tipo === 'comentario') return `💬 <b>${dados.usuario}</b> disse "${dados.texto}"`;
  if (dados.tipo === 'presente') return `🎁 <b>${dados.usuario}</b> mandou ${dados.quantidade}x ${dados.nomePresente || 'presente'}!`;
  if (dados.tipo === 'seguidor') return `➕ <b>${dados.usuario}</b> começou a seguir!`;
  if (dados.tipo === 'curtida') return `❤️ chuva de curtidas chegando!`;
  return '';
}

function processarFilaEventos() {
  if (mostrandoBanner || filaEventos.length === 0) return;
  mostrandoBanner = true;
  const dados = filaEventos.shift();
  bannerEvento.innerHTML = textoDoEvento(dados);
  bannerEvento.classList.add('visivel');
  setTimeout(() => {
    bannerEvento.classList.remove('visivel');
    setTimeout(() => {
      mostrandoBanner = false;
      processarFilaEventos();
    }, 400);
  }, 2200);
}

socket.on('evento', (dados) => {
  // evita fila gigante em picos de curtida
  if (dados.tipo === 'curtida' && filaEventos.some((e) => e.tipo === 'curtida')) return;
  filaEventos.push(dados);
  if (filaEventos.length > 8) filaEventos.shift();
  processarFilaEventos();
});

// ---------------------------------------------------------------------------
// Celebracao de evolucao
// ---------------------------------------------------------------------------
socket.on('evoluiu', (dados) => {
  document.getElementById('nomeEvolucao').textContent = dados.estagio;
  const celebracao = document.getElementById('celebracao');
  celebracao.classList.add('visivel');
  setTimeout(() => celebracao.classList.remove('visivel'), 3200);
});

// ---------------------------------------------------------------------------
// Painel de teste (tecla T)
// ---------------------------------------------------------------------------
const painelTeste = document.getElementById('painelTeste');
document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 't') {
    painelTeste.classList.toggle('visivel');
  }
});

function simular(tipo) {
  socket.emit('simular', { tipo });
}
</script>
