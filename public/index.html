<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Copo da Sorte</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --bg-deep: #2B0F12;
    --bg-deep-2: #3A1319;
    --panel: rgba(58, 19, 25, 0.92);
    --gold: #D4A24C;
    --gold-bright: #F4C860;
    --cream: #F3E7CE;
    --teal: #2E8B76;
    --red-alert: #C1432E;
    --font-display: 'Alfa Slab One', serif;
    --font-ui: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 20%, var(--bg-deep-2) 0%, var(--bg-deep) 70%);
    font-family: var(--font-ui);
    color: var(--cream);
  }

  .palco {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 5vh 6vw;
  }

  /* faixas decorativas de tenda de circo, bem discretas no topo/fundo */
  .palco::before, .palco::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 6vh;
    background: repeating-linear-gradient(90deg, var(--gold) 0 6vw, transparent 6vw 12vw);
    opacity: 0.12;
  }
  .palco::before { top: 0; }
  .palco::after { bottom: 0; }

  /* ---------- cabecalho ---------- */
  .cabecalho {
    text-align: center;
    z-index: 2;
  }
  .eyebrow {
    font-size: clamp(0.85rem, 3vw, 1.1rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin: 0 0 0.4vh 0;
    font-weight: 600;
  }
  .titulo {
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 7vw, 2.6rem);
    color: var(--cream);
    margin: 0;
    text-shadow: 0 3px 0 var(--red-alert), 0 6px 10px rgba(0,0,0,0.4);
    letter-spacing: 0.02em;
  }

  /* ---------- banner de fase ---------- */
  .banner-fase {
    margin-top: 3vh;
    text-align: center;
    min-height: 12vh;
    z-index: 2;
  }
  .banner-fase .texto {
    font-size: clamp(1.4rem, 6.5vw, 2.4rem);
    font-weight: 700;
    color: var(--gold-bright);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .contador {
    font-family: var(--font-display);
    font-size: clamp(2.6rem, 13vw, 4.2rem);
    color: var(--cream);
    line-height: 1;
    margin-top: 0.5vh;
  }
  .barra-tempo {
    width: min(80vw, 420px);
    height: 1.4vh;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    margin: 1.5vh auto 0 auto;
    overflow: hidden;
  }
  .barra-tempo .preenchimento {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--red-alert));
    width: 100%;
    transition: width 0.2s linear;
  }

  /* ---------- mesa com os copos ---------- */
  .mesa-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .mesa {
    position: relative;
    width: 100%;
    max-width: 520px;
    height: 32vh;
  }
  .sombra-mesa {
    position: absolute;
    bottom: 2vh;
    left: 50%;
    transform: translateX(-50%);
    width: 88%;
    height: 4vh;
    background: radial-gradient(ellipse, rgba(0,0,0,0.55) 0%, transparent 70%);
  }
  .copo {
    position: absolute;
    top: 6%;
    width: 27%;
    height: 78%;
    left: 2%;
    transition: left 0.55s cubic-bezier(.4,0,.2,1);
  }
  .rotulo {
    position: absolute;
    bottom: -6.5vh;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 8vw, 2.6rem);
    color: var(--gold-bright);
    text-shadow: 0 2px 0 rgba(0,0,0,0.5);
  }
  .bolinha {
    position: absolute;
    bottom: 6%;
    left: 50%;
    width: 22%;
    padding-top: 22%;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold) 55%, #8a6423 100%);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  .concha {
    position: absolute;
    inset: 0;
    border-radius: 48% 48% 12% 12% / 60% 60% 10% 10%;
    background: linear-gradient(180deg, var(--red-alert) 0%, #8f2a1c 100%);
    border: 3px solid var(--gold);
    box-shadow: 0 8px 16px rgba(0,0,0,0.5), inset 0 -10px 14px rgba(0,0,0,0.25);
    transition: transform 0.45s ease;
    transform-origin: bottom center;
  }
  .concha::after {
    content: '';
    position: absolute;
    left: 8%; right: 8%;
    bottom: 18%;
    height: 12%;
    border-top: 2px solid var(--gold-bright);
    opacity: 0.7;
  }
  .copo.levantado .concha {
    transform: translateY(-64%);
  }
  .copo.acerto .concha {
    background: linear-gradient(180deg, var(--teal) 0%, #163f36 100%);
  }

  /* ---------- instrucao ---------- */
  .instrucao {
    text-align: center;
    font-size: clamp(1rem, 4vw, 1.3rem);
    color: var(--cream);
    opacity: 0.9;
    max-width: 80vw;
    margin-top: 1vh;
    min-height: 3.2em;
    z-index: 2;
  }
  .instrucao b { color: var(--gold-bright); }

  /* ---------- ranking ---------- */
  .ranking {
    position: absolute;
    top: 6vh;
    left: 5vw;
    background: var(--panel);
    border: 2px solid var(--gold);
    border-radius: 10px;
    padding: 1.2vh 3vw 1.2vh 3vw;
    min-width: 38vw;
    max-width: 55vw;
    z-index: 3;
  }
  .ranking h3 {
    margin: 0 0 0.6vh 0;
    font-size: clamp(0.9rem, 3.4vw, 1.1rem);
    color: var(--gold-bright);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .ranking ol {
    margin: 0;
    padding-left: 1.1em;
    font-size: clamp(0.95rem, 3.6vw, 1.15rem);
    line-height: 1.5;
  }
  .ranking li span.pontos {
    color: var(--gold-bright);
    font-weight: 700;
  }

  /* ---------- banner de revelacao ---------- */
  .revelacao {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--panel);
    border: 3px solid var(--gold-bright);
    border-radius: 14px;
    padding: 3vh 6vw;
    text-align: center;
    max-width: 84vw;
    z-index: 5;
    display: none;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  .revelacao.visivel { display: block; }
  .revelacao .resposta-certa {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 8vw, 2.8rem);
    color: var(--gold-bright);
  }
  .revelacao ul {
    list-style: none;
    padding: 0;
    margin: 1.5vh 0 0 0;
    font-size: clamp(1rem, 4vw, 1.25rem);
  }
  .revelacao li { margin: 0.3vh 0; }

  /* ---------- painel de teste ---------- */
  .painel-teste {
    position: fixed;
    bottom: 2vh;
    right: 2vw;
    background: rgba(0,0,0,0.85);
    border: 2px solid var(--gold);
    border-radius: 10px;
    padding: 12px;
    z-index: 10;
    display: none;
    font-family: var(--font-ui);
    color: var(--cream);
    max-width: 60vw;
  }
  .painel-teste.visivel { display: block; }
  .painel-teste h4 { margin: 0 0 8px 0; font-size: 1rem; }
  .painel-teste .linha { display: flex; gap: 6px; margin-bottom: 6px; }
  .painel-teste button {
    background: var(--gold);
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.95rem;
  }
</style>
</head>
<body>

<div class="palco">
  <div class="cabecalho">
    <p class="eyebrow">Copo da Sorte</p>
    <h1 class="titulo" id="tituloRodada">Rodada #0</h1>
  </div>

  <div class="banner-fase">
    <div class="texto" id="textoFase">Preparando...</div>
    <div class="contador" id="contadorFase"></div>
    <div class="barra-tempo" id="barraTempoWrap" style="display:none;">
      <div class="preenchimento" id="barraTempo"></div>
    </div>
  </div>

  <div class="mesa-wrap">
    <div class="mesa" id="mesa">
      <div class="sombra-mesa"></div>
      <div class="copo" id="copo0" data-copo="0">
        <div class="bolinha"></div>
        <div class="concha"></div>
        <div class="rotulo">A</div>
      </div>
      <div class="copo" id="copo1" data-copo="1">
        <div class="bolinha"></div>
        <div class="concha"></div>
        <div class="rotulo">B</div>
      </div>
      <div class="copo" id="copo2" data-copo="2">
        <div class="bolinha"></div>
        <div class="concha"></div>
        <div class="rotulo">C</div>
      </div>
    </div>
  </div>

  <div class="instrucao" id="instrucao">
    Fique de olho na bolinha! Em instantes você vai poder responder.
  </div>

  <div class="ranking">
    <h3>🏆 Ranking</h3>
    <ol id="listaRanking">
      <li>Aguardando as primeiras respostas...</li>
    </ol>
  </div>

  <div class="revelacao" id="revelacao">
    <div class="resposta-certa" id="respostaCerta">A resposta era B!</div>
    <ul id="listaVencedores"></ul>
  </div>
</div>

<div class="painel-teste" id="painelTeste">
  <h4>Painel de teste (tecla T)</h4>
  <div class="linha">
    <button onclick="simular('A','comentario')">💬 A</button>
    <button onclick="simular('B','comentario')">💬 B</button>
    <button onclick="simular('C','comentario')">💬 C</button>
  </div>
  <div class="linha">
    <button onclick="simular('A','presente')">🎁 A</button>
    <button onclick="simular('B','presente')">🎁 B</button>
    <button onclick="simular('C','presente')">🎁 C</button>
  </div>
</div>

<script>
const socket = io();

const SLOT_X = ['2%', '36.5%', '71%']; // posicoes left: esquerda, centro, direita

// posicaoAtual[k] = slot em que o copo k esta atualmente
let posicaoAtual = [0, 1, 2];
let copoComBolinha = 0;

const elCopos = [document.getElementById('copo0'), document.getElementById('copo1'), document.getElementById('copo2')];

function posicionarSemAnimar() {
  elCopos.forEach((el, k) => {
    el.style.transition = 'none';
    el.style.left = SLOT_X[posicaoAtual[k]];
    // força reflow para a proxima mudança já animar
    void el.offsetWidth;
    el.style.transition = '';
  });
}

function levantarTodos(levantar) {
  elCopos.forEach((el) => el.classList.toggle('levantado', levantar));
}

function marcarAcerto(slot) {
  elCopos.forEach((el, k) => {
    el.classList.toggle('acerto', posicaoAtual[k] === slot);
  });
}

function limparMarcacoes() {
  elCopos.forEach((el) => el.classList.remove('acerto'));
}

// ---------------------------------------------------------------------------
// Maquina de fases vinda do servidor
// ---------------------------------------------------------------------------
let intervaloContador = null;

function pararContador() {
  if (intervaloContador) clearInterval(intervaloContador);
  intervaloContador = null;
}

function iniciarContadorRegressivo(duracaoMs, elTexto, elBarra) {
  pararContador();
  const total = duracaoMs;
  let restante = duracaoMs;
  elTexto.textContent = Math.ceil(restante / 1000);
  if (elBarra) elBarra.style.width = '100%';

  const passo = 100;
  intervaloContador = setInterval(() => {
    restante -= passo;
    if (restante <= 0) {
      restante = 0;
      pararContador();
    }
    elTexto.textContent = Math.ceil(restante / 1000);
    if (elBarra) elBarra.style.width = `${(restante / total) * 100}%`;
  }, passo);
}

socket.on('fase', (dados) => {
  const textoFase = document.getElementById('textoFase');
  const contadorFase = document.getElementById('contadorFase');
  const barraWrap = document.getElementById('barraTempoWrap');
  const barra = document.getElementById('barraTempo');
  const instrucao = document.getElementById('instrucao');
  const revelacao = document.getElementById('revelacao');

  if (dados.fase === 'mostrando') {
    document.getElementById('tituloRodada').textContent = `Rodada #${dados.rodada}`;
    revelacao.classList.remove('visivel');
    limparMarcacoes();
    posicaoAtual = [0, 1, 2];
    posicionarSemAnimar();
    copoComBolinha = dados.copoComBolinha;
    levantarTodos(true);
    textoFase.textContent = 'Observe a bolinha!';
    contadorFase.textContent = '';
    barraWrap.style.display = 'none';
    instrucao.innerHTML = 'A bolinha está embaixo de um dos copos. Preste atenção!';
  }

  if (dados.fase === 'embaralhando') {
    levantarTodos(false);
    textoFase.textContent = 'Embaralhando...';
    instrucao.innerHTML = 'Siga o copo com atenção!';
    barraWrap.style.display = 'none';

    const trocas = dados.trocas;
    const passoMs = dados.duracao / trocas.length;

    trocas.forEach(([slotI, slotJ], idx) => {
      setTimeout(() => {
        const copoNoSlotI = posicaoAtual.indexOf(slotI);
        const copoNoSlotJ = posicaoAtual.indexOf(slotJ);
        posicaoAtual[copoNoSlotI] = slotJ;
        posicaoAtual[copoNoSlotJ] = slotI;
        elCopos[copoNoSlotI].style.left = SLOT_X[slotJ];
        elCopos[copoNoSlotJ].style.left = SLOT_X[slotI];
      }, idx * passoMs);
    });
  }

  if (dados.fase === 'respondendo') {
    textoFase.textContent = 'Responda agora!';
    barraWrap.style.display = 'block';
    instrucao.innerHTML = 'Comente <b>A</b>, <b>B</b> ou <b>C</b>, ou mande o presente correspondente!';
    iniciarContadorRegressivo(dados.duracao, contadorFase, barra);
  }

  if (dados.fase === 'revelando') {
    pararContador();
    barraWrap.style.display = 'none';
    textoFase.textContent = 'Revelando...';
    contadorFase.textContent = '';
    levantarTodos(true);
    marcarAcerto(dados.correctSlot);

    const letra = ['A', 'B', 'C'][dados.correctSlot];
    document.getElementById('respostaCerta').textContent = `Era o copo ${letra}!`;

    const lista = document.getElementById('listaVencedores');
    lista.innerHTML = '';
    if (dados.vencedores.length === 0) {
      lista.innerHTML = '<li>Ninguém acertou essa rodada 😮</li>';
    } else {
      dados.vencedores.slice(0, 6).forEach((v) => {
        const li = document.createElement('li');
        const metodo = v.metodo === 'presente' ? '🎁' : '💬';
        li.innerHTML = `${metodo} <b>${v.nome}</b> +${v.pontos} pts`;
        lista.appendChild(li);
      });
    }
    revelacao.classList.add('visivel');
    instrucao.innerHTML = '';
  }

  if (dados.fase === 'pausa') {
    textoFase.textContent = 'Próxima rodada em instantes...';
  }
});

socket.on('ranking', (top) => {
  const lista = document.getElementById('listaRanking');
  if (!top.length) {
    lista.innerHTML = '<li>Aguardando as primeiras respostas...</li>';
    return;
  }
  lista.innerHTML = '';
  top.forEach((p) => {
    const li = document.createElement('li');
    li.innerHTML = `${p.nome} — <span class="pontos">${p.pontos} pts</span>`;
    lista.appendChild(li);
  });
});

// ---------------------------------------------------------------------------
// Painel de teste (tecla T)
// ---------------------------------------------------------------------------
const painelTeste = document.getElementById('painelTeste');
document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 't') {
    painelTeste.classList.toggle('visivel');
  }
});

const nomesFalsos = ['Ana', 'Bruno', 'Carla', 'Diego', 'Elis', 'Fabio'];
function simular(letra, metodo) {
  const slot = { A: 0, B: 1, C: 2 }[letra];
  const nome = nomesFalsos[Math.floor(Math.random() * nomesFalsos.length)] + Math.floor(Math.random() * 90);
  socket.emit('simular-resposta', { nome, slot, metodo });
}
</script>

</body>
</html>
