<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Aquario Virtual - Overlay TikTok LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root{
    --agua-topo: #0e5f73;
    --agua-fundo: #04202b;
    --agua-meio: #0a4a5c;
    --luz: rgba(255,255,255,0.55);
    --areia: #d8c08a;
    --vidro-brilho: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  #aquario {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg, var(--agua-topo) 0%, var(--agua-meio) 45%, var(--agua-fundo) 100%);
  }

  /* ---------- Raios de luz ---------- */
  .raio {
    position: absolute;
    top: -10%;
    width: 140px;
    height: 130%;
    background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.05) 55%, rgba(255,255,255,0) 100%);
    filter: blur(6px);
    transform-origin: top center;
    animation: balancarRaio 9s ease-in-out infinite;
    mix-blend-mode: screen;
    pointer-events: none;
  }
  @keyframes balancarRaio {
    0%, 100% { transform: rotate(-6deg) scaleY(1); opacity: 0.55; }
    50% { transform: rotate(4deg) scaleY(1.05); opacity: 0.85; }
  }

  /* ---------- Caustics (reflexo ondulado de luz na agua) ---------- */
  .caustics {
    position: absolute;
    inset: 0;
    opacity: 0.25;
    mix-blend-mode: screen;
    background-image:
      radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.5) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 20%, rgba(255,255,255,0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 45% 60%, rgba(255,255,255,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 70%, rgba(255,255,255,0.4) 0%, transparent 55%);
    background-size: 180% 180%;
    animation: mexerCaustics 14s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes mexerCaustics {
    0%   { background-position: 0% 0%; }
    50%  { background-position: 40% 25%; }
    100% { background-position: 10% 45%; }
  }

  /* ---------- Particulas / poeira na agua ---------- */
  .particula {
    position: absolute;
    width: 3px; height: 3px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: flutuarParticula linear infinite;
    pointer-events: none;
  }
  @keyframes flutuarParticula {
    from { transform: translateY(0) translateX(0); }
    to   { transform: translateY(-110vh) translateX(20px); }
  }

  /* ---------- Bolhas ---------- */
  .bolha {
    position: absolute;
    bottom: -30px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.15) 60%, rgba(255,255,255,0.05));
    border: 1px solid rgba(255,255,255,0.3);
    animation: subirBolha linear forwards;
    pointer-events: none;
  }
  @keyframes subirBolha {
    0%   { transform: translateY(0) translateX(0); opacity: 0.9; }
    85%  { opacity: 0.7; }
    100% { transform: translateY(-105vh) translateX(var(--deriva, 15px)); opacity: 0; }
  }

  /* ---------- Fundo: areia e decoracao ---------- */
  .areia {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 9%;
    background: linear-gradient(180deg, var(--areia) 0%, #b39b62 100%);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    box-shadow: 0 -6px 25px rgba(0,0,0,0.25) inset;
  }

  .decoracao { position: absolute; bottom: 7%; pointer-events: none; }

  /* ---------- Peixe (template generico) ---------- */
  .peixe {
    position: absolute;
    top: 0; left: 0;
    will-change: transform;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.35));
  }
  .peixe svg { display: block; overflow: visible; }
  .peixe .cauda {
    transform-origin: 100% 50%;
    animation: baterCauda 0.6s ease-in-out infinite;
  }
  @keyframes baterCauda {
    0%, 100% { transform: rotate(18deg); }
    50% { transform: rotate(-18deg); }
  }
  .peixe.turbo .cauda { animation-duration: 0.28s; }

  .tartaruga .nadadeira {
    transform-origin: 50% 0%;
    animation: remarNadadeira 1.1s ease-in-out infinite;
  }
  @keyframes remarNadadeira {
    0%, 100% { transform: rotate(-20deg); }
    50% { transform: rotate(20deg); }
  }

  /* ---------- Bolha de fala (comentarios) ---------- */
  .fala {
    position: absolute;
    max-width: 220px;
    background: rgba(255,255,255,0.95);
    color: #123;
    padding: 8px 12px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.3;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    animation: apareceFala 5s ease forwards;
    pointer-events: none;
    z-index: 50;
  }
  .fala b { color: #0a4a5c; }
  .fala::after {
    content: "";
    position: absolute;
    bottom: -8px; left: 20px;
    border-width: 8px 8px 0 0;
    border-style: solid;
    border-color: rgba(255,255,255,0.95) transparent transparent transparent;
  }
  @keyframes apareceFala {
    0% { opacity: 0; transform: translateY(6px) scale(0.9); }
    10% { opacity: 1; transform: translateY(0) scale(1); }
    85% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ---------- Toast de evento (presente / seguidor) ---------- */
  #toasts {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 6px;
    align-items: center;
    z-index: 60;
    pointer-events: none;
  }
  .toast {
    background: rgba(4, 32, 43, 0.75);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 14px;
    backdrop-filter: blur(4px);
    animation: entraToast 0.4s ease, sumeToast 0.5s ease 3.2s forwards;
    white-space: nowrap;
  }
  .toast.raro { border-color: #ffd76a; box-shadow: 0 0 14px rgba(255,215,106,0.5); }
  @keyframes entraToast { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes sumeToast { to { opacity: 0; transform: translateY(-10px); } }

  /* ---------- CTA (chamada para acao) ---------- */
  #cta-wrap {
    position: absolute;
    bottom: 3%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 55;
    pointer-events: none;
    display: flex;
    justify-content: center;
    width: 100%;
    padding: 0 16px;
  }
  #cta {
    background: rgba(4, 32, 43, 0.55);
    border: 1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(5px);
    color: #eafcff;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.2px;
    text-align: center;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    animation: respirarCta 3s ease-in-out infinite;
  }
  #cta .emoji { margin-right: 6px; }
  @keyframes respirarCta {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.035); }
  }
  #cta.trocando {
    animation: trocarCta 0.5s ease;
  }
  @keyframes trocarCta {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Vidro/vinheta por cima de tudo ---------- */
  .vinheta {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.45);
    pointer-events: none;
  }

  /* ================= PAINEL DE SIMULACAO (tecla T) ================= */
  #painel-teste {
    position: absolute;
    top: 20px; right: 20px;
    width: 260px;
    background: rgba(10, 20, 25, 0.92);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px;
    color: #fff;
    font-size: 13px;
    z-index: 100;
    display: none;
    backdrop-filter: blur(6px);
  }
  #painel-teste h3 { margin: 0 0 10px; font-size: 14px; color: #8fe3ff; }
  #painel-teste button {
    width: 100%;
    margin-bottom: 6px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #12707f;
    color: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  #painel-teste button:hover { background: #17909f; }
  #painel-teste .dourado { background: #a5781a; }
  #painel-teste .dourado:hover { background: #c48d1f; }
  #painel-teste input {
    width: 100%;
    padding: 7px;
    border-radius: 6px;
    border: none;
    margin-bottom: 6px;
    font-size: 13px;
  }
  #painel-teste .dica {
    opacity: 0.7; font-size: 11px; margin-top: 8px; line-height: 1.4;
  }
</style>
</head>
<body>

<div id="aquario">
  <div class="caustics"></div>
  <div class="raio" style="left:10%; animation-delay:0s;"></div>
  <div class="raio" style="left:35%; animation-delay:2s; width:100px;"></div>
  <div class="raio" style="left:65%; animation-delay:4s; width:160px;"></div>
  <div class="raio" style="left:85%; animation-delay:1s; width:90px;"></div>

  <div id="camada-peixes"></div>
  <div id="camada-bolhas"></div>
  <div id="camada-particulas"></div>
  <div id="camada-falas"></div>

  <div class="areia"></div>
  <div id="toasts"></div>
  <div id="cta-wrap"><div id="cta"></div></div>
  <div class="vinheta"></div>
</div>

<!-- ===================== PAINEL DE TESTE (tecla T) ===================== -->
<div id="painel-teste">
  <h3>🧪 Simular eventos</h3>
  <button onclick="simular('presente', {diamantes: 5, usuario: 'fan_teste'})">🎁 Presente pequeno (guppy)</button>
  <button onclick="simular('presente', {diamantes: 60, usuario: 'fan_teste'})">🎁 Presente médio (peixe-anjo)</button>
  <button onclick="simular('presente', {diamantes: 300, usuario: 'fan_teste'})">🎁 Presente grande (borboleta)</button>
  <button class="dourado" onclick="simular('presente', {diamantes: 1500, usuario: 'fan_vip'})">💎 Presente raro (peixe dourado)</button>
  <button class="dourado" onclick="simular('seguidor', {usuario: 'novo_fan'})">➕ Novo seguidor (tartaruga)</button>
  <button onclick="simular('curtida', {quantidade: 20})">❤️ Curtida x20</button>
  <input id="input-comentario" placeholder="Digite um comentário..." />
  <button onclick="enviarComentarioTeste()">💬 Enviar comentário</button>
  <div class="dica">Pressione <b>T</b> para abrir/fechar este painel. Ele não aparece para quem assiste a live.</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================
// ESTADO E CONEXAO
// ============================================================
const socket = io();
const camadaPeixes = document.getElementById('camada-peixes');
const camadaBolhas = document.getElementById('camada-bolhas');
const camadaParticulas = document.getElementById('camada-particulas');
const camadaFalas = document.getElementById('camada-falas');
const toasts = document.getElementById('toasts');

const peixesNaTela = new Map(); // id -> {el, x, y, dir, vel, fase, tamanho}
let boostAte = 0; // timestamp ate quando os peixes ficam "turbo" (curtidas)

// ------------------------------------------------------------
// Definicao visual de cada especie (cores e template SVG)
// ------------------------------------------------------------
const ESPECIES = {
  'guppy': { cor1: '#ff8a3d', cor2: '#ffd23d', turtle: false },
  'peixe-palhaco': { cor1: '#ff5a2e', cor2: '#ffffff', listrado: true, turtle: false },
  'peixe-anjo': { cor1: '#5ec6d9', cor2: '#1c7a91', turtle: false },
  'peixe-borboleta': { cor1: '#ffe14d', cor2: '#222', faixaOlho: true, turtle: false },
  'peixe-imperador': { cor1: '#3d5aff', cor2: '#ffd23d', listrado: true, turtle: false },
  'peixe-dourado': { cor1: '#ffcf40', cor2: '#ff9d2e', brilho: true, turtle: false },
  'tartaruga': { cor1: '#4a8c5c', cor2: '#2f5c3d', turtle: true },
};

// ------------------------------------------------------------
// Cria o SVG de um peixe comum (corpo + nadadeira + cauda animada)
// ------------------------------------------------------------
function criarSvgPeixe(def) {
  const listras = def.listrado
    ? `<path d="M -14 -10 Q -8 0 -14 10" stroke="${def.cor2}" stroke-width="3" fill="none" opacity="0.8"/>
       <path d="M -2 -13 Q 4 0 -2 13" stroke="${def.cor2}" stroke-width="3" fill="none" opacity="0.8"/>`
    : '';
  const faixaOlho = def.faixaOlho
    ? `<rect x="10" y="-14" width="6" height="28" fill="${def.cor2}" opacity="0.85" />`
    : '';
  const brilho = def.brilho ? `filter="url(#brilhoDourado)"` : '';

  return `
  <svg width="70" height="46" viewBox="-35 -23 70 46">
    <defs>
      <radialGradient id="corpoGrad" cx="35%" cy="35%" r="70%">
        <stop offset="0%" stop-color="${def.cor1}" stop-opacity="1"/>
        <stop offset="100%" stop-color="${def.cor2}" stop-opacity="1"/>
      </radialGradient>
      <filter id="brilhoDourado"><feGaussianBlur stdDeviation="1.2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g class="cauda" ${brilho}>
      <path d="M 18 0 L 34 -13 L 27 0 L 34 13 Z" fill="${def.cor2}" opacity="0.9"/>
    </g>
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="url(#corpoGrad)" ${brilho} />
    <path d="M -2 -10 Q 4 -18 10 -11 Q 3 -8 -2 -10 Z" fill="${def.cor2}" opacity="0.85"/>
    <path d="M -2 10 Q 4 18 10 11 Q 3 8 -2 10 Z" fill="${def.cor2}" opacity="0.85"/>
    ${listras}
    ${faixaOlho}
    <circle cx="12" cy="-3" r="2.6" fill="#111"/>
    <circle cx="12.7" cy="-3.6" r="0.8" fill="#fff"/>
  </svg>`;
}

function criarSvgTartaruga(def) {
  return `
  <svg width="80" height="56" viewBox="-40 -28 80 56">
    <defs>
      <radialGradient id="casco" cx="35%" cy="30%" r="75%">
        <stop offset="0%" stop-color="${def.cor1}"/>
        <stop offset="100%" stop-color="${def.cor2}"/>
      </radialGradient>
    </defs>
    <g class="nadadeira" style="transform-origin: -8px -6px;">
      <ellipse cx="-20" cy="-10" rx="9" ry="4" fill="${def.cor2}" opacity="0.9"/>
    </g>
    <g class="nadadeira" style="transform-origin: -8px 6px; animation-delay: 0.5s;">
      <ellipse cx="-20" cy="10" rx="9" ry="4" fill="${def.cor2}" opacity="0.9"/>
    </g>
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="url(#casco)"/>
    <path d="M -8 -12 L 0 -16 L 8 -12 L 8 12 L 0 16 L -8 12 Z" fill="${def.cor2}" opacity="0.35"/>
    <ellipse cx="26" cy="0" rx="7" ry="6" fill="${def.cor1}"/>
    <circle cx="30" cy="-1.5" r="1.6" fill="#111"/>
  </svg>`;
}

function montarElementoPeixe(peixe) {
  const def = ESPECIES[peixe.especie] || ESPECIES['guppy'];
  const el = document.createElement('div');
  el.className = 'peixe' + (def.turtle ? ' tartaruga' : '');
  el.style.transform = `scale(${peixe.tamanho})`;
  el.innerHTML = def.turtle ? criarSvgTartaruga(def) : criarSvgPeixe(def);
  camadaPeixes.appendChild(el);
  return el;
}

// ------------------------------------------------------------
// Adiciona um peixe ao aquario com posicao/velocidade aleatoria
// ------------------------------------------------------------
function adicionarPeixeNaTela(peixe) {
  if (peixesNaTela.has(peixe.id)) return;
  const el = montarElementoPeixe(peixe);
  const registro = {
    el,
    x: Math.random() * 80 + 5,
    y: Math.random() * 65 + 10,
    dir: Math.random() > 0.5 ? 1 : -1,
    vel: (0.03 + Math.random() * 0.04) * (def_tamanhoVel(peixe)),
    fase: Math.random() * Math.PI * 2,
    tamanho: peixe.tamanho,
    especie: peixe.especie,
  };
  peixesNaTela.set(peixe.id, registro);
}

function def_tamanhoVel(peixe) {
  // peixes maiores nadam um pouco mais devagar (mais organico)
  return peixe.especie === 'tartaruga' ? 0.6 : (1.3 - peixe.tamanho * 0.3);
}

// ------------------------------------------------------------
// Loop de animacao: move cada peixe em zigue-zague organico
// ------------------------------------------------------------
function animar() {
  const turbo = Date.now() < boostAte;
  peixesNaTela.forEach((p) => {
    p.fase += 0.02;
    p.x += p.dir * p.vel * (turbo ? 2.2 : 1);
    const y = p.y + Math.sin(p.fase) * 3;

    if (p.x > 92) { p.dir = -1; p.x = 92; }
    if (p.x < 2) { p.dir = 1; p.x = 2; }

    p.el.style.transform =
      `translate(${p.x}vw, ${y}vh) scale(${p.dir === -1 ? -p.tamanho : p.tamanho}, ${p.tamanho})`;
    p.el.classList.toggle('turbo', turbo);
  });
  requestAnimationFrame(animar);
}
requestAnimationFrame(animar);

// ============================================================
// BOLHAS E PARTICULAS AMBIENTE
// ============================================================
function criarBolha() {
  const b = document.createElement('div');
  const tamanho = 4 + Math.random() * 10;
  b.className = 'bolha';
  b.style.width = b.style.height = tamanho + 'px';
  b.style.left = Math.random() * 100 + 'vw';
  b.style.setProperty('--deriva', (Math.random() * 30 - 15) + 'px');
  b.style.animationDuration = (5 + Math.random() * 4) + 's';
  camadaBolhas.appendChild(b);
  setTimeout(() => b.remove(), 10000);
}
setInterval(criarBolha, 700);

function criarParticula() {
  const p = document.createElement('div');
  p.className = 'particula';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.bottom = '-10px';
  p.style.animationDuration = (14 + Math.random() * 10) + 's';
  camadaParticulas.appendChild(p);
  setTimeout(() => p.remove(), 25000);
}
setInterval(criarParticula, 1200);

function explosaoBolhas(qtd) {
  for (let i = 0; i < qtd; i++) setTimeout(criarBolha, i * 40);
}

// ============================================================
// CTA (chamada para acao) - convida o publico a interagir
// ============================================================
const FRASES_CTA = [
  '🎁 Manda um presente e solta um peixe novo no aquário!',
  '➕ Segue o perfil e libera uma tartaruga rara! 🐢',
  '❤️ Curte a live pra deixar os peixes agitados!',
  '💬 Comenta aí — seu comentário aparece no aquário!',
  '💎 Presentes maiores trazem peixes mais raros e bonitos',
];
const ctaEl = document.getElementById('cta');
let indiceCta = 0;

function mostrarProximaCta() {
  ctaEl.classList.remove('trocando');
  // forca reflow pra reiniciar a animacao de transicao
  void ctaEl.offsetWidth;
  ctaEl.textContent = FRASES_CTA[indiceCta];
  ctaEl.classList.add('trocando');
  indiceCta = (indiceCta + 1) % FRASES_CTA.length;
}
mostrarProximaCta();
setInterval(mostrarProximaCta, 6000);

// ============================================================
// EVENTOS RECEBIDOS DO SERVIDOR
// ============================================================
socket.on('estado-inicial', (estado) => {
  estado.peixes.forEach(adicionarPeixeNaTela);
});

socket.on('novo-peixe', (payload) => {
  adicionarPeixeNaTela(payload.peixe);
  const texto = payload.especial
    ? `➕ @${payload.usuario} seguiu! Uma tartaruga apareceu 🐢`
    : `🎁 @${payload.usuario} enviou ${payload.nomePresente || 'um presente'} — novo peixe!`;
  mostrarToast(texto, payload.peixe.raro);
});

socket.on('curtida', (payload) => {
  boostAte = Date.now() + 2500;
  explosaoBolhas(Math.min(15, Math.ceil(payload.quantidade / 3)));
});

socket.on('comentario', (payload) => {
  mostrarFala(payload.usuario, payload.texto);
});

function mostrarToast(texto, raro) {
  const t = document.createElement('div');
  t.className = 'toast' + (raro ? ' raro' : '');
  t.textContent = texto;
  toasts.appendChild(t);
  setTimeout(() => t.remove(), 3800);
}

function mostrarFala(usuario, texto) {
  if (!texto) return;
  const registros = Array.from(peixesNaTela.values());
  if (registros.length === 0) return;
  const alvo = registros[Math.floor(Math.random() * registros.length)];

  const fala = document.createElement('div');
  fala.className = 'fala';
  fala.innerHTML = `<b>@${usuario}</b><br>${escapeHtml(texto)}`;
  fala.style.left = `calc(${alvo.x}vw + 10px)`;
  fala.style.top = `${alvo.y}vh`;
  camadaFalas.appendChild(fala);
  setTimeout(() => fala.remove(), 5000);
}

function escapeHtml(texto) {
  const div = document.createElement('div');
  div.textContent = texto;
  return div.innerHTML;
}

// ============================================================
// PAINEL DE SIMULACAO (tecla T) - testar sem estar ao vivo
// ============================================================
const painel = document.getElementById('painel-teste');
document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 't') {
    painel.style.display = painel.style.display === 'none' ? 'block' : 'none';
  }
});

function simular(tipo, dados) {
  socket.emit('simular', { tipo, dados });
}

function enviarComentarioTeste() {
  const input = document.getElementById('input-comentario');
  const texto = input.value.trim();
  if (!texto) return;
